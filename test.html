<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Header</title>
    <style>
        .container {
            text-align: center;
            background-color: #f2f2f2;
            padding: 20px;
        }

        .profile-pic {
            display: inline-block;
            width: 100px;
            /* Adjust size as needed */
            height: 100px;
            /* Adjust size as needed */
            border-radius: 50%;
            /* Makes it round */
            margin-right: 20px;
            /* Spacing between profile pic and bio */
        }

        .bio {
            display: inline-block;
            vertical-align: top;
            /* Aligns text to top of the container */
        }
    </style>
</head>

<body>

    <div class="container">
        <img class="profile-pic" src="profile-pic.jpg" alt="Profile Picture">
        <div class="bio">
            <h1>Blog Title</h1>
            <p>Subtitle or Author Bio</p>
        </div>
    </div>

</body>

</html>
